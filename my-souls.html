<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your Souls — Cubist Souls</title>
<meta name="description" content="See the Cubist Souls you've freed, and your standing among the community that reclaimed the collection." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=Spectral:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<style>
  :root{
    --oxblood:#2e0a10; --wall:#7d101a; --wall-2:#a0101b; --wall-lite:#c24c52;
    --gild:#e0a520; --gild-deep:#a8761a; --bone:#f4ede1; --ink:#26090d;
    --mute:#d3a6a9; --smoke:#20090d; --ash:#4a1a20;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background-color:var(--wall); color:var(--bone);
    font-family:"Spectral",Georgia,serif; -webkit-font-smoothing:antialiased; min-height:100vh;
    background-image:
      repeating-linear-gradient(180deg, rgba(0,0,0,.10) 0 2px, transparent 2px 24px),
      radial-gradient(1200px 760px at 50% -60px, rgba(196,76,82,.4), transparent 72%),
      radial-gradient(1000px 900px at 50% 120%, var(--oxblood), transparent 60%);
  }
  a{color:var(--gild); text-decoration:none}
  .mono{font-family:"Space Mono",monospace}
  .display{font-family:"Big Shoulders Display",Impact,sans-serif; font-weight:800; text-transform:uppercase; line-height:.92}

  header{text-align:center; padding:52px 20px 8px}
  .eyebrow{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:var(--gild)}
  h1{font-family:"Big Shoulders Display",Impact,sans-serif; font-weight:800; text-transform:uppercase; line-height:.9; font-size:clamp(52px,13vw,120px); color:var(--bone); margin:6px 0 0; text-shadow:0 4px 20px rgba(0,0,0,.4)}
  .lede{font-style:italic; color:var(--bone); opacity:.9; max-width:560px; margin:12px auto 0; font-size:clamp(15px,2.2vw,19px)}

  main{max-width:1080px; margin:0 auto; padding:8px 20px 90px}

  .bar{display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; margin:26px 0 8px}
  button{font:inherit; cursor:pointer; border:none; border-radius:6px; padding:15px 30px; font-family:"Space Mono",monospace; font-weight:700; font-size:13px; letter-spacing:.06em; text-transform:uppercase; transition:.16s ease}
  .btn-connect{background:linear-gradient(180deg,#f0bf46,var(--gild) 55%,var(--gild-deep)); color:#2a1400; box-shadow:0 8px 24px rgba(224,165,32,.28)}
  .btn-connect:hover{transform:translateY(-2px)}
  .pill{display:inline-flex; align-items:center; gap:9px; background:rgba(0,0,0,.3); border:1px solid var(--ash); padding:11px 18px; border-radius:999px; font-size:13px; color:var(--mute); font-family:"Space Mono",monospace}
  .pill b{color:var(--bone)}
  .dot{width:7px;height:7px;border-radius:50%;background:#37d67a;box-shadow:0 0 10px #37d67a}

  /* recognition plaque */
  .badge{
    position:relative; max-width:640px; margin:22px auto 6px; text-align:center;
    background:linear-gradient(180deg, rgba(224,165,32,.16), rgba(224,165,32,.05));
    border:1px solid rgba(224,165,32,.45); border-radius:12px; padding:30px 26px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
  }
  .badge .tier{font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--gild)}
  .badge .headline{font-family:"Big Shoulders Display",sans-serif; font-weight:800; text-transform:uppercase; font-size:clamp(30px,5vw,46px); color:var(--bone); line-height:.95; margin:8px 0 4px}
  .badge .headline b{color:var(--gild)}
  .badge .stats{display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-top:14px}
  .badge .stat{font-family:"Space Mono",monospace; color:var(--mute); font-size:12px; letter-spacing:.1em; text-transform:uppercase}
  .badge .stat b{display:block; font-family:"Big Shoulders Display",sans-serif; font-weight:800; font-size:32px; color:var(--gild); letter-spacing:0}
  .share-row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:22px}
  .btn-share{font-family:"Space Mono",monospace; font-weight:700; font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    padding:12px 20px; border-radius:6px; cursor:pointer; border:1px solid transparent;
    background:linear-gradient(180deg,#f0bf46,var(--gild) 55%,var(--gild-deep)); color:#2a1400; transition:.16s ease}
  .btn-share:hover{transform:translateY(-1px)}
  .btn-share.ghost{background:transparent; border-color:rgba(224,165,32,.45); color:var(--bone)}
  .btn-share.ghost:hover{border-color:var(--gild); color:var(--gild)}

  .section-label{text-align:center; font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--gild); margin:44px 0 18px}

  .grid{display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .soul{position:relative; border-radius:10px; overflow:hidden; background:var(--smoke); border:2px solid var(--gild-deep); box-shadow:0 10px 26px rgba(0,0,0,.4); aspect-ratio:1; transition:.18s ease; display:block}
  .soul:hover{transform:translateY(-4px); border-color:var(--gild)}
  .soul img{width:100%; height:100%; object-fit:cover; display:block}
  .soul .tag{position:absolute; left:0; right:0; bottom:0; padding:14px 10px 7px; background:linear-gradient(transparent,rgba(0,0,0,.85)); font-family:"Space Mono",monospace; font-size:12px; font-weight:700; color:var(--bone)}
  .skeleton{aspect-ratio:1; border-radius:10px; background:linear-gradient(100deg,rgba(255,255,255,.05) 30%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.05) 70%); background-size:220% 100%; animation:sweep 1.3s infinite}
  @keyframes sweep{to{background-position:-220% 0}}

  .note{text-align:center; color:#dcc6bf; font-size:15px; line-height:1.7; padding:40px 16px}
  .note a{color:var(--gild)}

  /* rewards teaser */
  .rewards{max-width:760px; margin:46px auto 0; background:rgba(20,4,8,.4); border:1px solid rgba(224,165,32,.3); border-radius:12px; padding:30px 28px; text-align:center}
  .rewards h3{font-family:"Big Shoulders Display",sans-serif; font-weight:800; text-transform:uppercase; font-size:clamp(24px,4vw,34px); color:var(--bone); margin:0 0 6px}
  .rewards p{color:var(--mute); margin:0 auto; max-width:540px; font-size:16px; line-height:1.6}
  .perks{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:18px}
  .perk{font-family:"Space Mono",monospace; font-size:12px; color:var(--bone); background:rgba(224,165,32,.1); border:1px solid rgba(224,165,32,.3); padding:9px 14px; border-radius:999px}
  .draft{display:inline-block; margin-top:16px; font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#c79a4e; border:1px dashed var(--gild-deep); padding:4px 10px; border-radius:3px}

  nav.foot{text-align:center; padding:50px 20px 60px; font-family:"Space Mono",monospace; font-size:12px; color:var(--mute)}
  nav.foot a{margin:0 4px}

  .toast{position:fixed; top:64px; left:50%; transform:translateX(-50%); background:var(--smoke); border:1px solid var(--ash); color:var(--bone); padding:13px 20px; border-radius:10px; font-family:"Space Mono",monospace; font-size:13px; z-index:55; max-width:calc(100vw - 32px)}
  :focus-visible{outline:2px solid var(--gild); outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{animation:none !important}}

  .topnav{position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 14px; background:rgba(20,4,8,.72); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-bottom:1px solid rgba(224,165,32,.22)}
  .topnav .brand{display:flex; align-items:center; gap:8px; color:var(--bone); font-family:"Big Shoulders Display",Impact,sans-serif; font-weight:800; text-transform:uppercase; font-size:17px; letter-spacing:.02em; text-decoration:none}
  .topnav .brand img{width:26px; height:26px; border-radius:5px; border:1px solid var(--gild); background:#f5f9fc}
  .topnav .links{display:flex; gap:2px; flex-wrap:wrap; justify-content:flex-end}
  .topnav .links a{color:var(--mute); font-family:"Space Mono",ui-monospace,monospace; font-size:12px; letter-spacing:.05em; text-transform:uppercase; text-decoration:none; padding:6px 9px; border-radius:6px; white-space:nowrap}
  .topnav .links a:hover,.topnav .links a[aria-current]{color:var(--gild); background:rgba(224,165,32,.12)}
  @media(max-width:520px){ .topnav .brand span{display:none} .topnav .links a{padding:6px 7px; font-size:11px; letter-spacing:.02em} }
</style>
</head>
<body>

<nav class="topnav">
  <a class="brand" href="/"><img src="/assets/logo.svg" alt="" /><span>Cubist Souls</span></a>
  <div class="links">
    <a href="/">Burn</a>
    <a href="/gallery">The Freed</a>
    <a href="/my-souls" aria-current="page">Your Souls</a>
    <a href="https://opensea.io/collection/cubist-souls" target="_blank" rel="noopener">OpenSea</a>
  </div>
</nav>

<header>
  <div class="eyebrow">Your place in the gallery</div>
  <h1>Your Souls</h1>
  <p class="lede">Every Cubist Soul you freed, and your standing among the community that reclaimed the collection.</p>
</header>

<main>
  <div class="bar" id="bar">
    <button class="btn-connect" id="connect">Connect Wallet</button>
  </div>

  <div id="content" class="note">Connect your wallet to see the souls you've freed.</div>
</main>

<nav class="foot">
  <a href="/">🔥 Burn</a> · <a href="/gallery">🖼 The Freed</a> · <a href="https://opensea.io/collection/cubist-souls" target="_blank" rel="noopener">◆ OpenSea</a>
</nav>

<script>
const SOULS = "0x9252fdc0b3945203314ea1a9b8d64345bc868406";
const MULTICALL3 = "0xcA11bde05977b3631167028862bE2a173976CA11";
const DEPLOY_BLOCK = 25518546;
const RPCS = [
  "https://gateway.tenderly.co/public/mainnet",
  "https://ethereum-rpc.publicnode.com",
  "https://eth.llamarpc.com",
];
const ERC721_ABI = ["function ownerOf(uint256) view returns (address)"];
const MC_ABI = ["function tryAggregate(bool requireSuccess, (address target, bytes callData)[] calls) view returns ((bool success, bytes returnData)[])"];
const $ = s => document.querySelector(s);
const content = $("#content");
const IMG = id => `/api/img?id=${id}`;
let CARD_STATS = null; // {freed, rank, total, held, tier} — used to draw the shareable card

function toast(msg, ms=6000){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); if(ms) setTimeout(()=>t.remove(),ms);
}

async function reliableProvider(){
  for(const url of RPCS){ try{ const p=new ethers.JsonRpcProvider(url); await p.getBlockNumber(); return p; }catch(e){} }
  throw new Error("no rpc");
}

async function getLogsChunked(p, filter){
  try{ return await p.getLogs({...filter, fromBlock:DEPLOY_BLOCK, toBlock:"latest"}); }
  catch{
    const latest=await p.getBlockNumber(); let out=[];
    for(let from=DEPLOY_BLOCK; from<=latest; from+=9000){
      const to=Math.min(from+8999,latest);
      out=out.concat(await p.getLogs({...filter, fromBlock:from, toBlock:to}));
    }
    return out;
  }
}

async function ownersOf(p, ids){
  const iface=new ethers.Interface(ERC721_ABI);
  const mc=new ethers.Contract(MULTICALL3, MC_ABI, p);
  const out=new Map();
  for(let i=0;i<ids.length;i+=100){
    const chunk=ids.slice(i,i+100);
    const calls=chunk.map(id=>({target:SOULS, callData:iface.encodeFunctionData("ownerOf",[id])}));
    const res=await mc.tryAggregate(false, calls);
    res.forEach(({success,returnData},j)=>{ out.set(chunk[j], success? iface.decodeFunctionResult("ownerOf",returnData)[0].toLowerCase() : null); });
  }
  return out;
}

function tierOf(n){
  if(n>=50) return "Founding Patron";
  if(n>=20) return "Patron";
  if(n>=5)  return "Curator";
  return "Liberator";
}

$("#connect").onclick = connect;
async function connect(){
  if(!window.ethereum) return toast("No wallet found — install MetaMask or Rabby.");
  try{
    const bp=new ethers.BrowserProvider(window.ethereum);
    await bp.send("eth_requestAccounts",[]);
    const net=await bp.getNetwork();
    if(net.chainId!==1n){
      try{ await window.ethereum.request({method:"wallet_switchEthereumChain",params:[{chainId:"0x1"}]}); }
      catch{ return toast("Please switch your wallet to Ethereum mainnet."); }
    }
    const account=(await (await new ethers.BrowserProvider(window.ethereum).getSigner()).getAddress()).toLowerCase();
    $("#bar").innerHTML = `<span class="pill"><span class="dot"></span>${account.slice(0,6)}…${account.slice(-4)}</span>`;
    await loadSouls(account);
  }catch(e){ toast(`Connection failed: ${e.shortMessage||e.message}`); }
}

async function loadSouls(account){
  content.className="grid";
  content.innerHTML = Array.from({length:6}, ()=>`<div class="skeleton"></div>`).join("");

  let p;
  try{ p=await reliableProvider(); }
  catch{ content.className="note"; content.innerHTML="Couldn't reach the chain right now. Try again in a moment."; return; }

  const transfer = ethers.id("Transfer(address,address,uint256)");
  const padded = ethers.zeroPadValue(account, 32);
  const zero = "0x" + "0".repeat(64);

  let inLogs, mintLogs;
  try{
    inLogs = await getLogsChunked(p, {address:SOULS, topics:[transfer, null, padded]});
    mintLogs = await getLogsChunked(p, {address:SOULS, topics:[transfer, zero]});
  }catch{
    content.className="note"; content.innerHTML="Couldn't read your souls right now. Try again in a moment."; return;
  }

  // freed by this wallet + rank among liberators
  const tally=new Map();
  mintLogs.forEach(l=>{ const to="0x"+l.topics[2].slice(26).toLowerCase(); tally.set(to,(tally.get(to)||0)+1); });
  const freed = tally.get(account) || 0;
  const ranked = [...tally.entries()].sort((a,b)=>b[1]-a[1]);
  const rank = ranked.findIndex(r=>r[0]===account) + 1;
  const totalLibs = ranked.length;

  // souls currently owned (incl. bought, excl. sold)
  const candidates = [...new Set(inLogs.map(l=>Number(BigInt(l.topics[3]))))];
  const owners = candidates.length ? await ownersOf(p, candidates) : new Map();
  const owned = candidates.filter(id=>owners.get(id)===account).sort((a,b)=>a-b);

  render(account, freed, rank, totalLibs, owned);
}

function render(account, freed, rank, totalLibs, owned){
  if(freed === 0){
    content.className="note";
    content.innerHTML = `You haven't freed a soul yet — <a href="/">burn a Pikkazo</a> and its Cubist Soul comes to this wallet.`;
    return;
  }
  const tier = tierOf(freed);
  CARD_STATS = { freed, rank, total: totalLibs, held: owned.length, tier };
  content.className="";
  content.innerHTML = `
    <div class="badge">
      <div class="tier">Founding Liberator · ${tier}</div>
      <div class="headline">You freed <b>${freed}</b> soul${freed===1?"":"s"}</div>
      <div class="stats">
        <div class="stat"><b>#${rank}</b>of ${totalLibs} liberators</div>
        <div class="stat"><b>${freed}</b>souls freed</div>
        <div class="stat"><b>${owned.length}</b>held now</div>
      </div>
      <div class="share-row">
        <button id="shareCard" class="btn-share">🔥 Share on X</button>
        <button id="dlCard" class="btn-share ghost">⤓ Download card</button>
      </div>
    </div>
    <div class="section-label">Your collection · ${owned.length} soul${owned.length===1?"":"s"}</div>
    <div class="grid" id="soulgrid"></div>
    <div class="rewards">
      <h3>You were early</h3>
      <p>You reclaimed the collection when it mattered. Founding Liberators won't be forgotten — more on that soon.</p>
    </div>`;
  const grid = $("#soulgrid");
  if(!owned.length){
    grid.outerHTML = `<div class="note" style="padding:24px">You've freed souls but hold none right now.</div>`;
    return;
  }
  grid.innerHTML = owned.map(id=>`
    <a class="soul" href="https://opensea.io/item/ethereum/${SOULS}/${id}" target="_blank" rel="noopener">
      <img src="${IMG(id)}" loading="lazy" alt="Cubist Soul #${id}" />
      <div class="tag">Soul #${id}</div>
    </a>`).join("");
}

// ---- shareable recognition card (drawn client-side, WTP pattern) ----
function roundRect(x, X, Y, w, h, r){ x.beginPath(); x.moveTo(X+r,Y); x.arcTo(X+w,Y,X+w,Y+h,r); x.arcTo(X+w,Y+h,X,Y+h,r); x.arcTo(X,Y+h,X,Y,r); x.arcTo(X,Y,X+w,Y,r); x.closePath(); }

async function drawCard(s){
  try{ await document.fonts.ready; }catch{}
  const W=1200, H=630, c=document.createElement("canvas"); c.width=W; c.height=H;
  const x=c.getContext("2d");
  const g=x.createLinearGradient(0,0,0,H); g.addColorStop(0,"#a0101b"); g.addColorStop(.55,"#7d101a"); g.addColorStop(1,"#2e0a10");
  x.fillStyle=g; x.fillRect(0,0,W,H);
  x.strokeStyle="rgba(0,0,0,.10)"; x.lineWidth=1;
  for(let y=0;y<H;y+=24){ x.beginPath(); x.moveTo(0,y+.5); x.lineTo(W,y+.5); x.stroke(); }
  const m=54; roundRect(x,m,m,W-2*m,H-2*m,18); x.fillStyle="rgba(20,4,8,.35)"; x.fill(); x.strokeStyle="rgba(224,165,32,.5)"; x.lineWidth=2; x.stroke();
  x.textAlign="center";
  x.fillStyle="#e0a520"; x.font="700 22px 'Space Mono', monospace";
  x.fillText(`FOUNDING LIBERATOR · ${String(s.tier).toUpperCase()}`, W/2, 152, W-160);
  // headline: YOU FREED <n> SOULS (number in gold)
  x.font="800 92px 'Big Shoulders Display', sans-serif";
  const pre="YOU FREED ", num=String(s.freed), post=" SOULS";
  const wp=x.measureText(pre).width, wn=x.measureText(num).width, ws=x.measureText(post).width;
  let sx=(W-(wp+wn+ws))/2; const y1=278; x.textAlign="left";
  x.fillStyle="#f4ede1"; x.fillText(pre,sx,y1);
  x.fillStyle="#e0a520"; x.fillText(num,sx+wp,y1);
  x.fillStyle="#f4ede1"; x.fillText(post,sx+wp+wn,y1);
  x.textAlign="center";
  const cols=[[`#${s.rank}`,`OF ${s.total} LIBERATORS`],[String(s.freed),"SOULS FREED"],[String(s.held),"HELD NOW"]];
  const cx=[W/2-320,W/2,W/2+320], sy=420;
  cols.forEach((col,i)=>{ x.fillStyle="#e0a520"; x.font="800 62px 'Big Shoulders Display', sans-serif"; x.fillText(col[0],cx[i],sy);
    x.fillStyle="#d3a6a9"; x.font="400 18px 'Space Mono', monospace"; x.fillText(col[1],cx[i],sy+44); });
  x.fillStyle="rgba(244,237,225,.62)"; x.font="700 21px 'Space Mono', monospace";
  x.fillText("CUBIST SOULS · CUBISTSOULS.COM", W/2, H-92);
  return await new Promise(res=>c.toBlob(res,"image/png"));
}

function downloadBlob(blob, name){
  const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),2000);
}
// URL baked in (X only linkifies it when a char follows — the closing 🔥 does that);
// @cubistsouls sits in the body, never glued to the URL, so both stay linkified.
function shareText(s){ return `I freed ${s.freed} Cubist Soul${s.freed===1?"":"s"} 🖼️ Founding Liberator #${s.rank} of ${s.total} on @cubistsouls. Reclaimed by the community.\n\nhttps://cubistsouls.com/my-souls 🔥`; }

async function shareCard(){
  if(!CARD_STATS) return;
  const btn=$("#shareCard"); const old=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Making card…";}
  try{
    const blob=await drawCard(CARD_STATS);
    const file=new File([blob],"cubist-souls.png",{type:"image/png"});
    const text=shareText(CARD_STATS); // link + closing 🔥 already baked in
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], text, title:"Cubist Souls"}); if(btn){btn.disabled=false;btn.textContent=old;} return; }catch{}
    }
    // desktop: download the card + open the X composer (attach it to the tweet)
    downloadBlob(blob,"cubist-souls.png");
    toast("Card downloaded — attach it to your tweet ✨");
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`,"_blank","noopener");
  }catch(e){ toast("Couldn't make the card — try again."); }
  if(btn){btn.disabled=false;btn.textContent=old;}
}
async function downloadCard(){
  if(!CARD_STATS) return;
  try{ downloadBlob(await drawCard(CARD_STATS),"cubist-souls.png"); }catch{ toast("Couldn't make the card — try again."); }
}
document.addEventListener("click", e=>{
  if(e.target.closest("#shareCard")) shareCard();
  else if(e.target.closest("#dlCard")) downloadCard();
});

if(window.ethereum){
  window.ethereum.on?.("accountsChanged", ()=>location.reload());
  window.ethereum.on?.("chainChanged", ()=>location.reload());
  // Reconnect silently if the wallet already authorized this site (no popup).
  window.ethereum.request({method:"eth_accounts"}).then(a=>{ if(a&&a.length) connect(); }).catch(()=>{});
}
</script>
</body>
</html>
